services:
  postgres:
    image: postgres:16-alpine
    container_name: energy_platform_postgres
    environment:
      POSTGRES_DB: energy
      POSTGRES_USER: git
      POSTGRES_PASSWORD: energy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user -d energy"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: energy_platform_adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
